<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEOK Tacho OCRS Forecast — MCP App</title>
  <meta name="description" content="In-chat interactive forecast of DVSA OCRS 90 days out. MEOK MCP App per SEP-1865." />
  <!--
    MEOK MCP App — UI Resource bundle
    Spec: SEP-1865 (ratified 2026-01-26)
    Served at: ui://meok/tacho-audit/forecast
    Hosts: Claude (web + desktop), ChatGPT, VS Code Copilot, Goose, Postman, MCPJam, Archestra

    The hosting agent (Claude/ChatGPT/etc.) renders this in a sandboxed iframe.
    User interactions can call MCP tools via the postMessage JSON-RPC bridge.
  -->
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0a0a0a;
      --fg: #f5f5f5;
      --muted: #999;
      --primary: #fb923c;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --border: #2a2a2a;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #ffffff; --fg: #0a0a0a; --muted: #666; --border: #e5e5e5; }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--fg); padding: 16px; }
    h1 { margin: 0 0 6px; font-size: 16px; color: var(--primary); }
    p.lead { margin: 0 0 16px; color: var(--muted); font-size: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--fg); font: inherit; }
    button { width: 100%; padding: 10px; border-radius: 6px; border: 0; background: var(--primary); color: #000; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: rgba(251, 146, 60, 0.04); }
    .band { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 12px; }
    .band-GREEN { background: var(--green); color: #000; }
    .band-AMBER { background: var(--amber); color: #000; }
    .band-RED { background: var(--red); color: #fff; }
    .sig { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 10px; color: var(--muted); word-break: break-all; margin-top: 8px; }
    .badge { display: inline-flex; gap: 4px; align-items: center; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; color: var(--muted); margin-top: 8px; }
    .badge::before { content: "🔒"; }
    footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }
    footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <h1>DVSA OCRS — 90-day forecast</h1>
  <p class="lead">MEOK <code>tacho-audit</code> · MCP App per SEP-1865 · signed-by-default</p>

  <form id="form">
    <div class="row">
      <div>
        <label for="vrn">Fleet ID or VRN</label>
        <input id="vrn" name="vrn" value="ACME-FLEET-42" required />
      </div>
      <div>
        <label for="points">Current OCRS points</label>
        <input id="points" name="points" type="number" min="0" max="100" value="18" required />
      </div>
    </div>
    <div class="row">
      <div>
        <label for="trend">Trend (points/week, signed)</label>
        <input id="trend" name="trend" type="number" step="0.1" value="0.4" required />
      </div>
      <div>
        <label for="vehicles">Vehicles in fleet</label>
        <input id="vehicles" name="vehicles" type="number" min="1" value="40" required />
      </div>
    </div>
    <button id="go" type="submit">Forecast 90 days + sign</button>
  </form>

  <div id="output" hidden class="result">
    <div>Fleet: <strong id="r-vrn"></strong></div>
    <div>Current points: <strong id="r-points"></strong> (<span id="r-pct"></span>%)</div>
    <div>Forecast 90-day band: <span id="r-band" class="band"></span></div>
    <div>Weeks-to-RED: <strong id="r-weeks"></strong></div>
    <div class="sig">cert_id: <span id="r-id"></span></div>
    <div class="sig">sig: <span id="r-sig"></span></div>
    <div class="badge">Signed by meok-tacho-audit-mcp · HMAC-SHA256</div>
  </div>

  <footer>
    Verify any cert at
    <a href="https://meok-attestation-api.vercel.app/verify" target="_blank" rel="noopener">meok-attestation-api.vercel.app/verify</a>
    · Source <a href="https://github.com/CSOAI-ORG" target="_blank" rel="noopener">github.com/CSOAI-ORG</a>
  </footer>

  <script type="module">
    // MCP App bridge — postMessage JSON-RPC per SEP-1865.
    // When this UI Resource is loaded inside a host (Claude/ChatGPT/VS Code Copilot/Goose),
    // window.parent.postMessage with the mcp-app protocol fires actual tool calls.
    // Outside an MCP host (e.g. opened directly in a browser) we fall back to a local mock so the demo still works.

    const isInsideHost = typeof window !== "undefined" && window.parent !== window;

    function callMcpTool(name, args) {
      return new Promise((resolve, reject) => {
        if (!isInsideHost) {
          // Browser-direct mock — produces deterministic output for the demo.
          const pts = Number(args.current_points);
          const trend = Number(args.trend_per_week);
          const proj90 = pts + trend * (90 / 7);
          const pct = Math.round((pts / 400) * 100); // OCRS scale 0-400 in DVSA model
          const band = proj90 >= 30 ? "RED" : proj90 >= 20 ? "AMBER" : "GREEN";
          const weeksToRed = trend > 0 ? Math.max(0, (30 - pts) / trend) : Infinity;
          resolve({
            tool: name,
            args,
            result: {
              current_points: pts,
              current_score_pct: pct,
              forecast_90d_band: band,
              weeks_to_red_estimate: isFinite(weeksToRed) ? Math.round(weeksToRed * 10) / 10 : null,
              cert_id: "demo-" + crypto.randomUUID(),
              sig: "demo-" + (crypto.getRandomValues(new Uint8Array(8))).reduce((acc, b) => acc + b.toString(16).padStart(2, "0"), ""),
              issuer: "meok-tacho-audit-mcp",
              kid: "v1",
              note: "Demo mode — not signed by production key. Run via Claude/ChatGPT/VS Code Copilot/Goose for real signed cert.",
            },
          });
        }
        const id = "mcp-" + crypto.randomUUID();
        const onMessage = (ev) => {
          const msg = ev.data;
          if (!msg || msg.id !== id) return;
          window.removeEventListener("message", onMessage);
          if (msg.error) reject(msg.error);
          else resolve(msg.result);
        };
        window.addEventListener("message", onMessage);
        window.parent.postMessage({
          jsonrpc: "2.0",
          id,
          method: "tools/call",
          params: { name, arguments: args },
        }, "*");
      });
    }

    const form = document.getElementById("form");
    const go = document.getElementById("go");
    const out = document.getElementById("output");

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      go.disabled = true;
      go.textContent = "Signing…";
      const fd = new FormData(form);
      try {
        const res = await callMcpTool("forecast_ocrs_90_day", {
          fleet_id: fd.get("vrn"),
          current_points: fd.get("points"),
          trend_per_week: fd.get("trend"),
          fleet_size: fd.get("vehicles"),
        });
        const r = res.result;
        document.getElementById("r-vrn").textContent = fd.get("vrn");
        document.getElementById("r-points").textContent = r.current_points;
        document.getElementById("r-pct").textContent = r.current_score_pct;
        const bandEl = document.getElementById("r-band");
        bandEl.textContent = r.forecast_90d_band;
        bandEl.className = "band band-" + r.forecast_90d_band;
        document.getElementById("r-weeks").textContent = r.weeks_to_red_estimate == null ? "n/a (declining)" : r.weeks_to_red_estimate + " wks";
        document.getElementById("r-id").textContent = r.cert_id;
        document.getElementById("r-sig").textContent = r.sig.slice(0, 32) + "…";
        out.hidden = false;
      } catch (e) {
        alert("Forecast failed: " + (e?.message || e));
      } finally {
        go.disabled = false;
        go.textContent = "Forecast 90 days + sign";
      }
    });
  </script>
</body>
</html>
